<html lang="en">
<head>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<body class="w-full overflow-hidden text-black bg-[#f9f9f9] font-poppins ">
  <nav class="flex justify-between items-center py-6 sm:px-10 px-6 ">
    <h1 class="bg-white group p-2 rounded-lg backdrop-blur-lg shadow shadow-gray-200 text-xl font-semibold cursor-pointer">
      <a href="#home" class="transition inline-block delay-50 ease-out transform-gpu group-hover:scale-90 text-[#173401] font-bold">Balaji Clinic</a>
    </h1>
    <ul class="hidden list-none sm:flex p-2.5 px-4 rounded-full gap-6 bg-white text-md font-semibold shadow shadow-gray-200">
      <li><a href="#about">About</a></li>
      <li><a href="services">Services</a></li>
      <li><a href="testimonials">Testimonials</a></li>
      <li><a href="contact">Contact</a></li>
    </ul>
    <button class="bg-[#9FE870] p-2.5 hover:bg-[#173401] hover:text-white font-medium transition delay-150 rounded-2xl ">Book Appointment <i class="fa-solid fa-arrow-right"></i></button>
    <div id="hamit" class="sm:hidden flex justify-center items-center cursor-pointer relative">
      <i id="ham" class="fa-solid fa-bars text-2xl absolute right-2"></i>
      <i id="cross" class="fa-solid fa-xmark text-2xl opacity-0 absolute right-2"></i>
    </div>

  <div class="flex justify-center items-center">
  <ul id="mobilebar" class="hidden transition delay-100 absolute top-20 bg-white p-6 w-[90%] shadow shadow-gray-200 text-center font-medium space-y-6 rounded-3xl">
    <li><a href="#about">About</a></li>
    <li><a href="services">Services</a></li>
    <li><a href="testimonials">Testimonials</a></li>

  </section>
